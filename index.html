<!doctype html>
<html lang="pl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Hyrox HQ">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f766e">
<title>Hyrox HQ</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #f6f7f9;
    color: #8b98a5; font: 15px/1.5 -apple-system, system-ui, sans-serif; }
  /* Paski bezpiecznej strefy w kolorach apki (jasny/ciemny), żeby wtapiały się w treść:
     góra = tło strony (jak nagłówek), dół = kolor belki zakładek (biały). */
  .safe-top { position: fixed; top: 0; left: 0; right: 0; height: env(safe-area-inset-top, 0px);
    background: #f6f7f9; z-index: 2; }
  .safe-bot { position: fixed; bottom: 0; left: 0; right: 0; height: env(safe-area-inset-bottom, 0px);
    background: #ffffff; z-index: 2; }
  iframe { position: fixed; left: 0; right: 0; top: env(safe-area-inset-top, 0px);
    bottom: env(safe-area-inset-bottom, 0px); width: 100%; border: 0; }
  @media (prefers-color-scheme: dark) {
    html, body { background: #0f141a; }
    .safe-top { background: #0f141a; }
    .safe-bot { background: #1a222c; }
  }
  .hint { padding: 24px; max-width: 520px; }
  .hint code { color: #2dd4bf; word-break: break-all; }
</style>
</head>
<body>
<!--
  Nakładka Hyrox HQ — osadza apkę Apps Script w iframe (znika pasek "utworzone przez użytkownika").
  Wymaga w apce setXFrameOptionsMode(ALLOWALL). Token NIE jest w repo — czytany z location.hash.
  Paski safe-top/safe-bot rezerwują notch i home-indicator, w kolorach apki (light/dark).
-->
<div id="app"></div>
<script>
  var EXEC = "https://script.google.com/macros/s/AKfycbyeQNYnz_yVPC-_5v2lqRpbfSBQ0idjlvciHKd7865a14j6TabvmAsIT2sFgl0cEzbF/exec";
  var token = (location.hash || "").replace(/^#k?=?/, "").trim();
  var el = document.getElementById("app");
  if (token) {
    document.body.insertAdjacentHTML("beforeend", '<div class="safe-top"></div><div class="safe-bot"></div>');
    var f = document.createElement("iframe");
    f.src = EXEC + "?k=" + encodeURIComponent(token);
    f.title = "Hyrox HQ";
    f.setAttribute("allow", "clipboard-write; fullscreen");
    el.replaceWith(f);
  } else {
    el.className = "hint";
    el.innerHTML = "Dodaj token do adresu po <code>#</code>, np.<br><code>" +
      location.origin + location.pathname + "#TWOJ_TOKEN</code><br><br>Ten adres (z tokenem) dodaj na ekran główny telefonu.";
  }
</script>
</body>
</html>
