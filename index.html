<!doctype html>
<html lang="pl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Hyrox HQ">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#f6f7f9" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#0f141a" media="(prefers-color-scheme: dark)">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-512.png">
<title>Hyrox HQ</title>
<style>
:root{--bg:#f6f7f9;--card:#fff;--ink:#1a202c;--mut:#556274;--acc:#0f766e;--line:#e2e8f0;
--good:#0ca30c;--warn:#b45309;--crit:#d03b3b;--goodbg:#f0faf0;--warnbg:#fef8e7;--critbg:#fdf0f0;
--s1:#2a78d6;--s2:#1baf7a;--goodtxt:#006300}
@media(prefers-color-scheme:dark){:root{--bg:#0f141a;--card:#1a222c;--ink:#e6edf3;--mut:#8b98a5;--acc:#2dd4bf;--line:#2c3844;
--good:#0ca30c;--warn:#fab219;--crit:#e66767;--goodbg:#12210f;--warnbg:#292211;--critbg:#2b1616;
--s1:#3987e5;--s2:#199e70;--goodtxt:#0ca30c}}
*{box-sizing:border-box;max-width:100%}
html{background:var(--bg)}
html,body{overflow-x:hidden}
body{margin:0;background:var(--bg);color:var(--ink);font:15px/1.45 -apple-system,system-ui,sans-serif;
padding:calc(14px + env(safe-area-inset-top,0px)) 14px calc(84px + env(safe-area-inset-bottom,0px));
/* Stała wysokość dokumentu: krótkie podstrony (Timer, Notatki) dawały dokument krótszy niż ekran,
   a przełączenie krótka↔długa zmieniało przewijalność → iOS klampował scroll i stopka skakała. */
box-sizing:border-box;min-height:100vh;min-height:100dvh}
.x,.em,.ev,.note,.t,.rx,.coach{overflow-wrap:anywhere}
.coach{margin-top:10px;border-left:3px solid var(--acc);background:var(--card);border-radius:0 8px 8px 0;padding:8px 12px;font-size:13px;white-space:pre-wrap}
.coach .ch{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--acc);font-weight:700;margin-bottom:3px}
.shoe{margin-top:8px;background:var(--card);border:1px solid var(--line);border-radius:8px;padding:8px 12px;font-size:13px}
.shoe b{color:var(--acc)}
h1{font-size:18px;margin:0}.sub{color:var(--mut);font-size:12px}
.head{display:flex;align-items:baseline;gap:10px;margin-bottom:12px;flex-wrap:wrap}
.refresh{margin-left:auto;border:1px solid var(--line);background:var(--card);color:var(--mut);border-radius:999px;
padding:4px 12px;font-size:13px;cursor:pointer}
.chips{display:flex;gap:6px;flex-wrap:wrap;margin:0 0 12px}
.chip{background:var(--card);border:1px solid var(--line);border-radius:999px;padding:3px 11px;font-size:12px;color:var(--mut)}
.chip b{color:var(--acc)}
.card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:10px}
.card.today{border-color:var(--acc)}.card.past{opacity:.6}
.d{font-size:12px;color:var(--mut)}.t{font-weight:650;margin:2px 0;font-size:16px}.x{font-size:13px;color:var(--mut);white-space:pre-wrap}
.st{float:right;font-size:12px;color:var(--acc);font-weight:600}
h2{font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:var(--mut);margin:18px 0 8px}
.sem{border-radius:12px;padding:12px 14px;margin-bottom:12px;border:1px solid var(--line)}
.sem.l0{background:var(--goodbg);border-color:var(--good)}.sem.l1{background:var(--warnbg);border-color:var(--warn)}.sem.l2{background:var(--critbg);border-color:var(--crit)}
.sem .lbl{font-weight:700;font-size:14px}
.sem.l0 .lbl{color:var(--good)}.sem.l1 .lbl{color:var(--warn)}.sem.l2 .lbl{color:var(--crit)}
.sem ul{margin:6px 0 0;padding-left:18px;font-size:13px}.sem .vals{font-size:12px;color:var(--mut);margin-top:6px}
.btn{display:inline-block;border:1px solid var(--line);background:var(--card);color:var(--ink);border-radius:9px;padding:9px 14px;font-size:14px;font-weight:600;cursor:pointer}
.btn.pri{background:var(--acc);border-color:var(--acc);color:#fff}
.btn.sm{padding:5px 10px;font-size:12px}
.btnrow{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.form{margin-top:10px;display:none}.form.open{display:block}
.form label{display:block;font-size:12px;color:var(--mut);margin:8px 0 3px}
.form select,.form input,.form textarea{width:100%;padding:8px;border:1px solid var(--line);border-radius:8px;background:var(--bg);color:var(--ink);font:inherit;font-size:16px}
.form textarea{min-height:56px}
.grid2{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.phases{display:flex;height:20px;border-radius:6px;overflow:hidden;border:1px solid var(--line)}
.phases .ph{display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--mut);background:var(--line)}
.phases .ph.on{background:var(--acc);color:#fff}.phases .ph+.ph{border-left:2px solid var(--bg)}
.lev{display:grid;grid-template-columns:88px 1fr 84px;gap:6px 8px;align-items:center}
.lev .n{font-size:12px;color:var(--mut);text-align:right}
.lev .bar{position:relative;height:13px;background:var(--line);border-radius:4px}
.lev .fill{position:absolute;left:0;top:0;bottom:0;background:var(--s1);border-radius:4px}
.lev .tick{position:absolute;top:-3px;bottom:-3px;width:2px;background:var(--ink)}
.lev .g{font-size:11px;color:var(--goodtxt);font-weight:600}
.mrow{display:flex;gap:5px;align-items:flex-end;height:70px}
.mcol{flex:1;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;gap:2px}
.mcol .mv{font-size:10px;color:var(--ink);font-weight:600}.mcol .mb{width:100%;border-radius:3px 3px 0 0;min-height:3px;background:var(--s2)}
.mcol .mb.flag{background:var(--crit)}.mcol .ml{font-size:9px;color:var(--mut)}.mcol .mdelta{font-size:9px}
.acwr{display:flex;align-items:baseline;gap:10px}.acwr .r{font-size:30px;font-weight:700}
.acwr .r.l0{color:var(--goodtxt)}.acwr .r.l1{color:var(--warn)}.acwr .r.l2{color:var(--crit)}
.rule{display:flex;gap:8px;align-items:flex-start;padding:6px 0;border-bottom:1px solid var(--line);font-size:13px}
.rule:last-child{border-bottom:0}.dot{width:9px;height:9px;border-radius:50%;margin-top:5px;flex:none}
.dot.ok{background:var(--good)}.dot.watch{background:var(--warn)}.dot.fired{background:var(--crit)}.dot.na{background:var(--mut);opacity:.4}
.rule .rn{font-weight:600}.rule .rx{color:var(--mut)}
.filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.fbtn{border:1px solid var(--line);background:var(--card);border-radius:999px;padding:8px 13px;font-size:12px;cursor:pointer;color:var(--mut);display:inline-block}
.fbtn.on{background:var(--acc);border-color:var(--acc);color:#fff}
.entry{border:1px solid var(--line);border-radius:10px;padding:9px 12px;margin-bottom:8px}
.entry .eh{display:flex;justify-content:space-between;font-size:12px;color:var(--mut)}
.entry .em{font-size:13px;margin:3px 0}.entry .ev{font-size:12px;color:var(--acc);white-space:pre-wrap}
.tabs{position:fixed;bottom:0;left:0;right:0;display:flex;background:var(--card);border-top:1px solid var(--line);
padding-bottom:env(safe-area-inset-bottom,0px)}
.tab{flex:1;text-align:center;padding:11px 0 13px;font-size:12px;color:var(--mut);cursor:pointer;font-weight:600}
.tab.on{color:var(--acc);box-shadow:inset 0 3px 0 var(--acc)}
.view{display:none}.view.on{display:block}
.toast{position:fixed;bottom:calc(62px + env(safe-area-inset-bottom,0px));left:50%;transform:translateX(-50%);
background:var(--ink);color:var(--bg);padding:9px 16px;border-radius:999px;font-size:13px;opacity:0;transition:opacity .25s;pointer-events:none;max-width:90%}
.toast.show{opacity:1}
.note{border-left:3px solid var(--line);padding:4px 10px;margin-bottom:8px;font-size:13px}
.note .m{color:var(--mut);font-size:11px}.note.nowa{border-left-color:var(--acc)}
.splash{padding:40px 10px;text-align:center;color:var(--mut)}
.tab{padding-left:0;padding-right:0}
.res{font-size:24px;font-weight:700;color:var(--acc);margin-top:8px}
.res .u{font-size:13px;color:var(--mut);font-weight:400}
.ptable{width:100%;border-collapse:collapse;font-size:13px;margin-top:6px}
.ptable td,.ptable th{padding:5px 4px;border-bottom:1px solid var(--line);text-align:right}
.ptable th{color:var(--mut);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.04em}
.ptable th:first-child,.ptable td:first-child{text-align:left}
.ptable td:first-child{color:var(--mut)}
.ptable tr:last-child td{border-bottom:0}
.ct{font-size:14px;font-weight:650;margin-bottom:2px}
#v-tools select,#v-tools input{width:100%;padding:8px;border:1px solid var(--line);border-radius:8px;background:var(--bg);color:var(--ink);font:inherit;font-size:16px}
#v-tools label{display:block;font-size:12px;color:var(--mut);margin:8px 0 3px}
.rc{display:grid;grid-template-columns:1fr 84px;gap:5px 8px;align-items:center;margin-top:8px}
.dblg{display:grid;grid-template-columns:1fr 64px 72px;gap:5px 8px;align-items:center;margin-top:8px}
.dblg .dh{font-size:11px;color:var(--mut);font-weight:600}
.dblg input{padding:6px 8px;border-radius:7px;text-align:center}
.chkr{display:flex;gap:8px;align-items:flex-start;font-size:13px;padding:5px 0;border-bottom:1px solid var(--line)}
.chkr:last-of-type{border-bottom:0}
.chkr input{width:auto!important;margin-top:2px;accent-color:var(--acc)}
.chkr.done{color:var(--mut);text-decoration:line-through}
#v-tools .rc label{font-size:13px;color:var(--ink);margin:0}
#v-tools .rc input{padding:6px 8px;border-radius:7px;text-align:center}
.rtot{display:flex;align-items:baseline;gap:10px;margin-top:12px;padding-top:10px;border-top:1px solid var(--line)}
.rtot .big{font-size:30px;font-weight:700}
.rtot .big.l0{color:var(--goodtxt)}.rtot .big.l1{color:var(--warn)}.rtot .big.l2{color:var(--crit)}
.stn{border:1px solid var(--line);border-radius:10px;margin-bottom:8px;background:var(--card);overflow:hidden}
.stn-h{display:flex;align-items:center;gap:8px;padding:10px 12px;cursor:pointer}
.stn-h .nm{font-weight:650;font-size:14px}.stn-h .sp{font-size:11px;color:var(--mut)}
.stn-h .tm{margin-left:auto;text-align:right;font-size:12px;color:var(--mut);white-space:nowrap}
.stn-h .tm b{color:var(--acc);font-size:14px}
.stn-b{display:none;padding:0 12px 11px;font-size:13px}
.stn.open .stn-b{display:block}
.stn-b .row3{display:flex;gap:6px;margin-bottom:8px}
.stn-b .row3 .c{flex:1;border:1px solid var(--line);border-radius:8px;padding:5px 8px;text-align:center}
.stn-b .row3 .k{font-size:10px;text-transform:uppercase;letter-spacing:.04em;color:var(--mut)}
.stn-b .row3 .v{font-weight:700;font-size:15px}
.stn-b .tip{margin:0 0 6px;color:var(--ink)}
.stn-b ul{margin:4px 0 0;padding-left:18px;color:var(--mut)}
.stn-b ul li{margin-bottom:3px}
.badge{display:inline-block;width:auto;font-size:10px;font-weight:700;border-radius:5px;padding:1px 6px;text-transform:uppercase;letter-spacing:.03em;vertical-align:1px}
.badge.lev{background:var(--critbg);color:var(--crit)}
.badge.hold{background:var(--goodbg);color:var(--goodtxt)}
.seq{display:flex;flex-wrap:wrap;gap:4px;align-items:center;font-size:12px;font-weight:600;color:var(--ink)}
.seq .ar{color:var(--mut);font-weight:400}
.tmr .clk{font-size:44px;font-weight:700;text-align:center;font-variant-numeric:tabular-nums;margin:4px 0}
.tmr .seg{text-align:center;font-size:15px;font-weight:650}
.tmr .segt{text-align:center;font-size:12px;color:var(--mut);margin-bottom:8px}
.tmr .bigbtn{width:100%;padding:16px;font-size:17px;border-radius:12px}
.tmr .dneg{color:var(--goodtxt)}.tmr .dpos{color:var(--crit)}
.tr2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.trc{border:1px solid var(--line);border-radius:10px;padding:8px 10px;background:var(--card)}
.trc .k{font-size:11px;color:var(--mut);text-transform:uppercase;letter-spacing:.04em}
.trc .v{font-size:18px;font-weight:700}.trc .v .u{font-size:11px;font-weight:400;color:var(--mut)}
.trc .dd{font-size:11px;color:var(--mut)}
.trc svg{width:100%;height:36px;display:block;margin-top:4px;color:var(--acc)}
</style>
</head>
<body>
<div class="head"><h1>Hyrox HQ</h1><span class="sub" id="stan"></span><button class="refresh" onclick="boot()">⟳ odśwież</button></div>
<div id="splash" class="splash">Ładowanie…</div>
<div id="v-dzis" class="view on"></div>
<div id="v-tydz" class="view"></div>
<div id="v-analiza" class="view"></div>
<div id="v-dziennik" class="view"></div>
<div id="v-note" class="view"></div>
<div id="v-tools" class="view"></div>
<div class="tabs">
  <div class="tab on" data-v="dzis">Dziś</div>
  <div class="tab" data-v="tydz">Tydzień</div>
  <div class="tab" data-v="analiza">Analiza</div>
  <div class="tab" data-v="dziennik">Dziennik</div>
  <div class="tab" data-v="note">Notatki</div>
  <div class="tab" data-v="tools">Narzędzia</div>
</div>
<div class="toast" id="toast"></div>
<script>

var MAKSY=[{n:"Bench press",x:100,y:110},{n:"Back squat",x:130,y:140},{n:"Martwy ciąg",x:170,y:180},{n:"Strict press",x:60,y:65},{n:"Push press",x:70,y:70},{n:"Front squat",x:110,y:110},{n:"Clean",x:80,y:80},{n:"Snatch",x:58,y:58},{n:"Clean & Jerk",x:55,y:55},{n:"Thruster",x:47,y:50}];

var STACJE=[

{k:"farmers",n:"Farmers Carry",simN:"Farmers",spec:"200 m · 2×24 kg",teraz:"1:29",med:"1:40",cel:"1:30",celD:"~1:30",lev:0,tip:"Top kohorty — bez odkładania, przejść pewnie.",dr:["Tylko podtrzymanie chwytu — już top kohorty, nie inwestuj więcej"]},

function spark(vals){
  var pts=[];vals.forEach(function(v,i){if(v!=null)pts.push([i,v]);});
  if(pts.length<2)return "<div class=\"dd\">za mało danych</div>";
  var ys=pts.map(function(p){return p[1];}),mn=Math.min.apply(null,ys),mx=Math.max.apply(null,ys),sp=(mx-mn)||1;
  var n=vals.length-1||1;
  var poly=pts.map(function(p){return (p[0]/n*100).toFixed(1)+","+(32-((p[1]-mn)/sp*28+2)).toFixed(1);}).join(" ");
  return "<svg viewBox=\"0 0 100 36\" preserveAspectRatio=\"none\"><polyline points=\""+poly+"\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\" vector-effect=\"non-scaling-stroke\"/></svg>";
}
function trendCard(label,unit,vals,dec){
  var nn=vals.filter(function(v){return v!=null;});
  if(!nn.length)return "<div class=\"trc\"><div class=\"k\">"+label+"</div><div class=\"dd\">brak danych</div></div>";
  var last=nn[nn.length-1],avg=nn.reduce(function(a,b){return a+b;},0)/nn.length;
  var d=last-avg,ds=(d>=0?"+":"−")+Math.abs(d).toFixed(1);
  return "<div class=\"trc\"><div class=\"k\">"+label+"</div><div class=\"v\">"+last.toFixed(dec)+(unit?" <span class=\"u\">"+unit+"</span>":"")+"</div><div class=\"dd\">śr. "+avg.toFixed(1)+" · "+ds+" vs śr. · n="+nn.length+"</div>"+spark(vals)+"</div>";
}

function parseMS(s){ // przyjmuje 4:40 · 4.40 · 440 (=4:40) · 4030 (=40:30); waliduje sek 0–59, odrzuca ujemne/4:99
  s=String(s==null?"":s).trim();if(!s)return null;var m,sec;
  if(s.indexOf(":")>-1||s.indexOf(".")>-1){var p=s.split(/[:.]/);if(p.length!==2)return null;m=parseInt(p[0],10);sec=parseInt(p[1],10);}
  else if(/^\d{3,4}$/.test(s)){m=parseInt(s.slice(0,-2),10);sec=parseInt(s.slice(-2),10);}
  else return null;
  if(isNaN(m)||isNaN(sec)||m<0||sec<0||sec>=60)return null;return m*60+sec;}
function fmtMS(sec){sec=Math.round(sec);return Math.floor(sec/60)+":"+pad2(sec%60);}
function fmtHMS(sec){sec=Math.round(sec);if(sec<3600)return Math.floor(sec/60)+":"+pad2(sec%60);var h=Math.floor(sec/3600);return h+":"+pad2(Math.floor(sec%3600/60))+":"+pad2(sec%60);}

function vdotFrom(distM,tSec){var tmin=tSec/60,v=distM/tmin;var vo2=-4.60+0.182258*v+0.000104*v*v;var pct=0.8+0.1894393*Math.exp(-0.012778*tmin)+0.2989558*Math.exp(-0.1932605*tmin);return vo2/pct;}
function velFromPct(vdot,pct){var vo2=vdot*pct,a=0.000104,b=0.182258,c=-(4.60+vo2);return (-b+Math.sqrt(b*b-4*a*c))/(2*a);} // m/min

    "<label>Nr startowy</label><input id=\"st-nr\" value=\""+esc(CS.nr)+"\" oninput=\"startInp()\"></div></div>";
  h+="<div class=\"card\"><div class=\"ct\">Timeline dnia</div><div id=\"st-tl\"></div></div>";
  h+="<div class=\"card\"><div class=\"ct\">Torba — wieczór przed</div>"+startChkHtml("torba")+"</div>";
  h+="<div class=\"card\"><div class=\"ct\">Rano w dniu startu</div>"+startChkHtml("rano")+"<div class=\"sub\" style=\"margin-top:6px\">Taktyka i fueling → sekcja Playbook.</div></div>";
  }
  if(TSEC==="playbook"){
  // --- Race-day playbook ---
  h+="<h2>Race-day playbook</h2><div class=\"sub\" style=\"margin-bottom:8px\">Szkielet z planu — finalne tempa, liczba żeli i rozbicie serii WB po symulacjach (faza Specyficzna).</div>";
  h+=PLAYBOOK.map(function(p,i){
    return "<div class=\"stn\" id=\"pbk-"+i+"\"><div class=\"stn-h\" onclick=\"tg2('pbk-"+i+"')\"><div><div class=\"nm\">"+esc(p.n)+"</div><div class=\"sp\">"+esc(p.s)+"</div></div><div class=\"tm\">▾</div></div>"+
      "<div class=\"stn-b\"><p class=\"tip\">"+esc(p.tip)+"</p><ul>"+p.dr.map(function(d){return "<li>"+esc(d)+"</li>";}).join("")+"</ul></div></div>";
  }).join("");
  }
  if(TSEC==="pb"){
  // --- Baza PB ---
  h+="<h2>Baza PB</h2><div class=\"card\"><div class=\"ct\">Starty</div><table class=\"ptable\">"+PBS.starty.map(function(p){return "<tr><td>"+esc(p.n)+(p.x?"<br><span class=\"sub\">"+esc(p.x)+"</span>":"")+"</td><td><b>"+esc(p.v)+"</b></td></tr>";}).join("")+"</table>";
  h+="<div class=\"ct\" style=\"margin-top:12px\">Bieg</div><table class=\"ptable\">"+PBS.bieg.map(function(p){return "<tr><td>"+esc(p.n)+(p.x?" <span class=\"sub\">("+esc(p.x)+")</span>":"")+"</td><td><b>"+esc(p.v)+"</b></td></tr>";}).join("")+"</table>";
  h+="<div class=\"ct\" style=\"margin-top:12px\">Maksy siłowe <span class=\"sub\">(2026-07-06 · potwierdzony / szac.)</span></div><table class=\"ptable\">"+MAKSY.map(function(m){return "<tr><td>"+esc(m.n)+"</td><td><b>"+m.x+"</b>"+(m.y>m.x?" <span class=\"sub\">/ "+m.y+"</span>":"")+"</td></tr>";}).join("")+"</table>";
  h+="<div class=\"ct\" style=\"margin-top:12px\">Cele sezonu</div><table class=\"ptable\">"+PBS.cele.map(function(p){return "<tr><td>"+esc(p.n)+(p.x?" <span class=\"sub\">("+esc(p.x)+")</span>":"")+"</td><td><b>"+esc(p.v)+"</b></td></tr>";}).join("")+"</table></div>";
  }
  $("v-tools").innerHTML=h;
  if(TSEC==="kalk"){calcW();calcP();calcC('p');}
  if(TSEC==="race")fillR('teraz');
  if(TSEC==="timer")tmrRender();
  if(TSEC==="dbl")calcDbl();
  if(TSEC==="start")startTL();
}
function tgS(i){$("stn-"+i).classList.toggle("open");}
function tg2(id){$(id).classList.toggle("open");}
// ---------- #29 Doubles ----------
function dblSave(){try{localStorage.setItem("hx_dbl",JSON.stringify(DBL));}catch(e){}}
function calcDbl(){
  var sum=0,bad=false;
  DBLST.forEach(function(s){
    DBL.s[s.k]=parseInt($("d-s-"+s.k).value,10)||0;
    DBL.t[s.k]=$("d-t-"+s.k).value;
    var v=parseMS(DBL.t[s.k]);if(v==null)bad=true;else sum+=v;
  });
  DBL.pace=$("d-pace").value;DBL.rox=$("d-rox").value;
  var pc=parseMS(DBL.pace),rx=parseMS(DBL.rox);
  if(pc==null||rx==null)bad=true;else sum+=pc*8+rx;
  dblSave();
  if(bad){$("d-res").innerHTML="<div class=\"sub\" style=\"margin-top:8px\">wpisz czasy mm:ss</div>";return;}
  var d=3600-sum,cls=d>=0?"dneg":"dpos";
  $("d-res").innerHTML="<div class=\"res\">"+fmtMS(sum)+" <span class=\"u\">/ cel 60:00 · "+(d>=0?"bufor":"BRAKUJE")+" <span class=\""+cls+"\">"+fmtMS(Math.abs(d))+"</span></span></div>"+
    "<div class=\"sub\">bieg "+fmtMS(pc*8)+" · stacje "+fmtMS(sum-pc*8-rx)+" · roxzone "+fmtMS(rx)+"</div>";
}
function dblReset(){if(!confirm("Wyzerować szkic doubles? Podział stacji i cele wrócą do domyślnych."))return;DBL={pace:"4:12",rox:"2:30",s:{},t:{}};dblSave();renderTools();}
function dblSend(b){
  var L=["Plan doubles Mix 15.10 (szkic z apki):","Bieg razem "+DBL.pace+"/km · roxzone "+DBL.rox];
  DBLST.forEach(function(s){L.push(s.n+": ja "+(DBL.s[s.k]!=null?DBL.s[s.k]:s.split)+"% / partnerka "+(100-(DBL.s[s.k]!=null?DBL.s[s.k]:s.split))+"% · cel "+(DBL.t[s.k]||s.t));});
  run("apiNote",L.join("\n"),function(){BOOT.inbox.unshift({w:"teraz",t:"notatka",x:L.join("\n"),s:"nowa"});renderNote();toast("Plan w Inboxie — Claude przetworzy");},b);
}
// ---------- #12 e1RM ----------
function e1Of(kg,r){kg=parseFloat(kg);r=parseInt(r,10);if(!kg||!r)return "—";return Math.round(r===1?kg:kg*(1+r/30));}
function e1Add(){
  var i=parseInt($("l-lift").value,10),kg=$("l-kg").value,r=$("l-r").value,rpe=$("l-rpe").value;
  if(!parseFloat(kg)||!parseInt(r,10)){toast("Podaj kg i powtórzenia");return;}
  LSEL=i;LIFT.pend.push([BOOT.today,MAKSY[i].n,parseFloat(kg),parseInt(r,10),rpe||"","apka"]);liftSave();renderTools();
}
function e1Del(i){LIFT.pend.splice(i,1);liftSave();renderTools();}
function e1Save(b){
  var rows=LIFT.pend.slice();
  run("apiLift",rows,function(){
    if(!BOOT.sila)BOOT.sila=[];
    rows.forEach(function(p){BOOT.sila.push({d:p[0],b:p[1],kg:p[2],r:p[3],rpe:p[4]});});
    LIFT.pend=[];liftSave();renderTools();toast(rows.length+" ser. w arkuszu (Siła)");
  },b);
}
function e1Trend(){
  if(!BOOT.sila)return "<div class=\"sub\">Historia pojawi się po wdrożeniu backendu v11 (zakładka Siła w arkuszu).</div>";
  var m=MAKSY[LSEL],rows=BOOT.sila.filter(function(x){return x.b===m.n&&x.kg&&x.r;});
  if(!rows.length)return "<div class=\"sub\">Brak wpisów dla: "+esc(m.n)+". Dodaj serie powyżej — trend zbuduje się sam.</div>";
  var byDay={},order=[];
  rows.forEach(function(x){var e=x.r===1?x.kg:x.kg*(1+x.r/30);if(!(x.d in byDay)){byDay[x.d]={e:0,kg:0,r:0};order.push(x.d);}if(e>byDay[x.d].e)byDay[x.d]={e:e,kg:x.kg,r:x.r};});
  var vals=order.map(function(d){return byDay[d].e;});
  var best=Math.max.apply(null,vals),last=byDay[order[order.length-1]];
  var h="<div class=\"res\">"+Math.round(last.e)+" <span class=\"u\">kg e1RM (ost. sesja: "+last.kg+"×"+last.r+")</span></div>";
  h+="<div class=\"sub\">best "+Math.round(best)+" kg · potwierdzony 1RM "+m.x+" ("+Math.round(last.e/m.x*100)+"%) · szac. "+m.y+" ("+Math.round(last.e/m.y*100)+"%) · sesji: "+order.length+"</div>";
  if(vals.length>1)h+="<div class=\"trc\" style=\"margin-top:8px\">"+spark(vals)+"</div>";
  h+="<table class=\"ptable\" style=\"margin-top:8px\">"+order.slice(-8).reverse().map(function(d){var s=byDay[d];return "<tr><td style=\"text-align:left\">"+esc(d)+"</td><td>"+s.kg+"×"+s.r+"</td><td><b>"+Math.round(s.e)+"</b></td></tr>";}).join("")+"</table>";
  return h;
}
// ---------- #27 Strona startu ----------
function startSave(){try{localStorage.setItem("hx_start",JSON.stringify(START));}catch(e){}}
function startRace(k){START.race=k;startSave();renderTools();}
function startInp(){var CS=START[START.race];CS.time=$("st-time").value;CS.wave=$("st-wave").value;CS.nr=$("st-nr").value;startSave();startTL();}
function startTL(){
  var el=$("st-tl");if(!el)return;
  var CS=START[START.race],t=parseMS(CS.time);
  if(t==null){el.innerHTML="<div class=\"sub\">Wpisz godzinę startu, a rozpiszę cały dzień (pobudka → kofeina → rozgrzewka → start).</div>";return;}
  el.innerHTML="<table class=\"ptable\">"+STL.map(function(r){
    var m=t+r[0],hh=Math.floor(((m%1440)+1440)%1440/60),mm=((m%60)+60)%60;
    return "<tr><td style=\"text-align:left\">"+esc(r[1])+"</td><td><b>"+hh+":"+pad2(mm)+"</b></td></tr>";}).join("")+"</table>";
}
function startChkHtml(g){
  var CS=START[START.race];
  return SCHK[g].map(function(it,i){var id=g+i,on=!!CS.chk[id];
    return "<label class=\"chkr"+(on?" done":"")+"\"><input type=\"checkbox\""+(on?" checked":"")+" onchange=\"startChk('"+id+"',this.checked)\"> "+esc(it)+"</label>";}).join("");
}
function startChk(id,v){var CS=START[START.race];CS.chk[id]=v;startSave();renderTools();}
// ---------- Timer symulacji ----------
function tmrSave(){try{localStorage.setItem("hx_tmr",JSON.stringify(TMR));}catch(e){}}
function tmrSplits(){var out=[],prev=TMR.t0;for(var i=0;i<TMR.laps.length;i++){out.push((TMR.laps[i]-prev)/1000);prev=TMR.laps[i];}return out;}
function tmrDelta(sec,tgt){var d=Math.round(sec-parseMS(tgt));if(!d)return "<span class=\"sub\">0:00</span>";var cls=d<0?"dneg":"dpos";return "<span class=\""+cls+"\">"+(d<0?"−":"+")+fmtMS(Math.abs(d))+"</span>";}
function tmrRender(){
  var box=$("tmr-box");if(!box)return;
  var n=TMR.laps.length;
  if(!TMR.t0){
    box.innerHTML="<div class=\"sub\" style=\"margin-bottom:10px\">16 segmentów: Bieg 1 → SkiErg → … → Bieg 8 → Wall Balls. Okrążenie na końcu każdego segmentu (przejścia roxzone wliczone w bieg). Stan przeżywa odświeżenie strony.</div><button class=\"btn pri bigbtn\" onclick=\"tmrStart()\">▶ Start symulacji</button>";
    return;
  }
  if(n>=SIMSEG.length){
    var sp=tmrSplits(),tot=(TMR.laps[n-1]-TMR.t0)/1000;
    var rows=SIMSEG.map(function(s,i){return "<tr><td>"+esc(s.n)+"</td><td>"+fmtMS(sp[i])+"</td><td>"+esc(s.t)+"</td><td>"+tmrDelta(sp[i],s.t)+"</td></tr>";}).join("");
    box.innerHTML="<div class=\"clk\">"+fmtHMS(tot)+"</div><div class=\"segt\">symulacja zakończona — "+tmrDelta(tot,"70:00")+" vs 70:00</div><table class=\"ptable\"><tr><th>Segment</th><th>Czas</th><th>Cel</th><th>Δ</th></tr>"+rows+"</table><div class=\"btnrow\"><button class=\"btn pri\" onclick=\"tmrSend(this)\">Wyślij do Inboxu</button><button class=\"btn\" onclick=\"tmrReset()\">Reset</button></div>";
    return;
  }
  var seg=SIMSEG[n];
  var last=n?("ost.: "+esc(SIMSEG[n-1].n)+" "+fmtMS(tmrSplits()[n-1])+" (cel "+esc(SIMSEG[n-1].t)+")"):"";
  box.innerHTML="<div class=\"clk\" id=\"tm-clk\">0:00</div><div class=\"seg\">"+(n+1)+"/16 · "+esc(seg.n)+"</div><div class=\"segt\">cel segmentu "+esc(seg.t)+(last?" · "+last:"")+"</div><button class=\"btn pri bigbtn\" onclick=\"tmrLap()\">⏱ Okrążenie — koniec: "+esc(seg.n)+"</button><div class=\"btnrow\"><button class=\"btn sm\" onclick=\"tmrReset()\">przerwij i wyzeruj</button></div>";
  tmrTick();
}
function tmrTick(){var el=$("tm-clk");if(!el||!TMR.t0||TMR.laps.length>=SIMSEG.length)return;var base=TMR.laps.length?TMR.laps[TMR.laps.length-1]:TMR.t0;el.textContent=fmtHMS((Date.now()-base)/1000);}
setInterval(tmrTick,250);
function tmrStart(){TMR={t0:Date.now(),laps:[]};tmrSave();tmrRender();}
function tmrLap(){var now=Date.now();var prev=TMR.laps.length?TMR.laps[TMR.laps.length-1]:TMR.t0;if(prev&&now-prev<3000){toast("Za szybko — okrążenie zignorowane (min 3 s)");return;}TMR.laps.push(now);tmrSave();tmrRender();if(TMR.laps.length>=SIMSEG.length)toast("Meta! Sprawdź splity");}
function tmrReset(){if(!confirm("Wyzerować timer symulacji?"))return;TMR={t0:null,laps:[]};tmrSave();tmrRender();}
function tmrSend(b){
  var sp=tmrSplits(),tot=(TMR.laps[TMR.laps.length-1]-TMR.t0)/1000;
  var txt="Symulacja (timer apki) "+BOOT.today+": TOTAL "+fmtHMS(tot)+" | "+SIMSEG.map(function(s,i){return s.n+" "+fmtMS(sp[i])+" (cel "+s.t+")";}).join(" | ");
  run("apiNote",txt,function(){BOOT.inbox.unshift({w:"teraz",t:"notatka",x:txt,s:"nowa"});renderNote();toast("Wynik w Inboxie — Claude przetworzy");},b);
}
function calcW(){var m=MAKSY[+$("w-lift").value],pct=parseFloat($("w-pct").value),base=$("w-base").value,rm=base==="y"?m.y:m.x;var res=$("w-res");if(isNaN(pct)||pct<=0){res.innerHTML="<div class=\"sub\" style=\"margin-top:8px\">podaj %</div>";return;}var kg=round25(rm*pct/100);var note=(base==="x"&&m.y>m.x)?" <span class=\"sub\">(szac. sufit "+m.y+")</span>":"";var tbl="<table class=\"ptable\"><tr><th>%</th><th>kg</th></tr>"+[60,65,70,75,80,85,90,95].map(function(p){return "<tr><td>"+p+"%</td><td>"+round25(rm*p/100)+"</td></tr>";}).join("")+"</table>";res.innerHTML="<div class=\"res\">"+kg+" kg <span class=\"u\">= "+pct+"% z "+rm+" kg"+note+"</span></div>"+tbl;}
function calcP(){var dist=+$("p-dist").value,t=parseMS($("p-time").value),res=$("p-res");if(t==null){res.innerHTML="<div class=\"sub\" style=\"margin-top:8px\">podaj czas mm:ss</div>";return;}var vd=vdotFrom(dist,t);var zones=[["E — easy/long",0.70],["M — maraton/tempo ciągłe",0.84],["T — próg",0.88],["I — interwały VO2",0.975],["R — reps/szybkość",1.05]];var rows=zones.map(function(z){var v=velFromPct(vd,z[1]),pace=1000/v,ms=v/60;return "<tr><td>"+z[0]+"</td><td>"+fmtMS(pace*60)+"</td><td>"+ms.toFixed(2)+"</td></tr>";}).join("");res.innerHTML="<div class=\"res\">VDOT "+vd.toFixed(1)+"</div><table class=\"ptable\"><tr><th>Intensywność</th><th>/km</th><th>m/s</th></tr>"+rows+"</table>";}
function calcC(from){var pe=$("c-pace"),me=$("c-ms");if(from==='p'){var s=parseMS(pe.value);if(s==null||s<=0)return;me.value=(1000/s).toFixed(2);}else{var v=parseFloat(String(me.value).replace(',','.'));if(isNaN(v)||v<=0)return;pe.value=fmtMS(1000/v);}}
function fillR(preset){RCOMP.forEach(function(c){var el=$("r-"+c.k);if(el)el.value=c[preset];});calcR();}
function calcR(){var run=parseMS($("r-run").value),bad=(run==null);var runSec=run==null?0:run*8,stSec=0;RCOMP.forEach(function(c){if(c.run)return;var s=parseMS($("r-"+c.k).value);if(s==null){bad=true;return;}stSec+=s;});var res=$("r-res");if(bad){res.innerHTML="<div class=\"rtot\"><span class=\"sub\">uzupełnij pola mm:ss</span></div>";return;}var tot=runSec+stSec,lvl=tot<4200?0:(tot<4439?1:2);var vsG=tot-4200,vsPB=tot-4439;function sg(x){return (x>0?"+":x<0?"−":"")+fmtMS(Math.abs(x));}res.innerHTML="<div class=\"rtot\"><span class=\"big l"+lvl+"\">"+fmtHMS(tot)+"</span><span class=\"sub\">bieg "+fmtHMS(runSec)+" · stacje+rox "+fmtHMS(stSec)+"</span></div><table class=\"ptable\"><tr><td>vs cel Solo sub-70 (1:10:00)</td><td>"+sg(vsG)+"</td></tr><tr><td>vs PB czysto (1:13:59)</td><td>"+sg(vsPB)+"</td></tr></table>";}
function renderAll(){$("stan").textContent="stan na "+BOOT.today;renderDzis();renderTydz();renderAnaliza();renderDziennik();renderNote();renderTools();}
function tf(id){$(id).classList.toggle("open");}
function setFilter(f){FILTER=f;renderDziennik();}
function done(d,b){run("apiCheckDone",d,function(){BOOT.plan.forEach(function(p){if(p.d===d)p.st="✓";});BOOT.adh.weekDone++;renderAll();toast("Odhaczone ✓");},b);}
function sendLog(b){var o={day:$("l-day").value,rpe:$("l-rpe").value,sw:$("l-sw").value,note:$("l-note").value};var t=BOOT.plan.find(function(p){return p.d===BOOT.today;});if(t)o.session=t.t;run("apiQuickLog",o,function(r){BOOT.inbox.unshift({w:"teraz",t:"log",x:r.txt,s:"nowa"});renderNote();toast("Zapisane — Claude przetworzy");},b);}
function sendNote(b){var t=$("n-txt").value;if(!t.trim()){toast("Pusta notatka");return;}run("apiNote",t,function(){BOOT.inbox.unshift({w:"teraz",t:"notatka",x:t,s:"nowa"});renderNote();toast("W inboxie");},b);}
function sendMorning(b){var o={sw:$("m-sw").value,waga:$("m-waga").value,bol:$("m-bol").value};run("apiMorning",o,function(){toast("Poranek zapisany");},b);}
function sendFuel(b){var o={kcal:$("f-kcal").value,bialko:$("f-bialko").value};run("apiFuel",o,function(r){BOOT.inbox.unshift({w:"teraz",t:"makra",x:r.txt,s:"nowa"});toast("Makra zapisane");},b);}
document.querySelectorAll(".tab").forEach(function(tb){tb.onclick=function(){document.querySelectorAll(".tab").forEach(function(x){x.classList.remove("on");});document.querySelectorAll(".view").forEach(function(x){x.classList.remove("on");});tb.classList.add("on");$("v-"+tb.dataset.v).classList.add("on");window.scrollTo(0,0);};});
// Stopka: zwykłe position:fixed;bottom:0 (patrz CSS .tabs) — bez gimnastyki z visualViewport.
// Podskakiwanie na przełączeniu zakładek brało się z listenerów vv.scroll/resize; a „powiększanie"
// layoutu po dotknięciu pola to auto-zoom iOS na inputach <16px — ugaszony font-size:16px na polach.
boot();
